layout: blog
title: Free Courses
order: 4
group: navigation
tags : [blog, posts, post]
author : Antonio Trento
css: 
js:
keywords: bootstrap4, UI kit, jekyll
permalink: /courses/
---
{% include JB/setup %}


{% for course in site.courses %}
	  <div class="blog-block post-content-area">
      <div class="row">
        <div class="col-md-6 col-sm-12 p-0 blog-image-wrap">
          <div class="blog-image">
            <img src="{{ BASE_PATH }}/assets/images/{{ course.img }}" alt="{{ course.title }} image">
          </div>
        </div>    
        <div class="col-md-6 col-sm-12 p-0">
          <div class="d-flex align-items-center blog-post-wrap">
            <div class="blog-post">
              <h3><a href="{{ BASE_PATH }}{{ course.url }}">{{ course.title }}</a></h3>
              <p>{{ course.excerpt }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
	  <div class="mb-60"></div>
{% endfor %}
